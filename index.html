<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tax & Insurance Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .nav-active { @apply bg-indigo-600 text-white shadow-md scale-105; }
        .glass-card { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(226, 232, 240, 1); }
        .input-group { @apply bg-slate-50 rounded-xl p-4 border border-slate-200 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 transition-all; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-8">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
        <div class="flex items-center space-x-4">
            <div class="p-4 bg-indigo-600 rounded-2xl shadow-xl shadow-indigo-100">
                <i class="fa-solid fa-chart-line text-white text-3xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">TAX MASTER <span class="text-indigo-600">2026</span></h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">2026 대한민국 개정 세법 산식 탑재</p>
            </div>
        </div>
        <div class="flex items-center space-x-4 bg-white p-2 pr-6 rounded-full border border-slate-200 shadow-sm">
            <span class="flex h-3 w-3 relative ml-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
            <div class="text-sm font-bold text-slate-700">2026.04 정밀 세무 로직 가동중</div>
        </div>
    </header>

    <nav class="flex overflow-x-auto no-scrollbar gap-2 mb-8 p-1.5 bg-slate-200/50 rounded-2xl border border-slate-200">
        <button onclick="switchTab('income')" id="tab-income" class="flex-1 min-w-[140px] py-3.5 rounded-xl font-bold text-sm transition-all text-slate-600 hover:bg-white/80">종합소득세</button>
        <button onclick="switchTab('finance')" id="tab-finance" class="flex-1 min-w-[140px] py-3.5 rounded-xl font-bold text-sm transition-all text-slate-600 hover:bg-white/80">금융소득종합</button>
        <button onclick="switchTab('transfer')" id="tab-transfer" class="flex-1 min-w-[140px] py-3.5 rounded-xl font-bold text-sm transition-all text-slate-600 hover:bg-white/80">양도소득세</button>
        <button onclick="switchTab('holding')" id="tab-holding" class="flex-1 min-w-[140px] py-3.5 rounded-xl font-bold text-sm transition-all text-slate-600 hover:bg-white/80">취득·보유세</button>
        <button onclick="switchTab('gift')" id="tab-gift" class="flex-1 min-w-[140px] py-3.5 rounded-xl font-bold text-sm transition-all text-slate-600 hover:bg-white/80">상속·증여세</button>
        <button onclick="switchTab('insurance')" id="tab-insurance" class="flex-1 min-w-[140px] py-3.5 rounded-xl font-bold text-sm transition-all text-slate-600 hover:bg-white/80">보험설계</button>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card rounded-[2.5rem] shadow-sm overflow-hidden border-slate-200">
                <div class="p-8 border-b border-slate-100 bg-slate-50/50">
                    <h2 id="section-title" class="text-xl font-extrabold text-slate-900">입력 데이터 진단</h2>
                    <p id="section-desc" class="text-sm text-slate-500 mt-1">입력된 조건에 따라 2026년 실시간 세액 산출이 시작됩니다.</p>
                </div>
                <div id="dynamic-inputs" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white rounded-[2rem] p-8 border border-slate-200 shadow-sm relative overflow-hidden group">
                    <p class="text-[11px] font-black text-slate-400 uppercase mb-2 tracking-wider">2026 예상 산출 세액</p>
                    <div class="flex items-baseline space-x-2">
                        <span id="res-tax" class="text-3xl font-black text-slate-900">0</span>
                        <span class="text-lg font-bold text-slate-400">원</span>
                    </div>
                    <div class="mt-4 flex items-center text-xs font-bold text-indigo-600">
                        <i class="fa-solid fa-check-double mr-1.5"></i> 누진세율 및 구간공제 적용 완료
                    </div>
                </div>
                <div class="bg-indigo-600 rounded-[2rem] p-8 text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
                    <p class="text-[11px] font-black text-indigo-200 uppercase mb-2 tracking-wider">공제/감면 혜택액</p>
                    <div class="flex items-baseline space-x-2">
                        <span id="res-benefit" class="text-3xl font-black">0</span>
                        <span class="text-lg font-bold text-indigo-300">원</span>
                    </div>
                    <div class="mt-4 flex items-center text-xs font-bold text-indigo-100">
                        <i class="fa-solid fa-star mr-1.5"></i> AI 기반 최적 절세액 도출
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5">
            <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white h-full shadow-2xl relative sticky top-8">
                <div class="flex items-center space-x-4 mb-10">
                    <div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center rotate-3">
                        <i class="fa-solid fa-robot text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase tracking-widest text-indigo-400">2026 Tax Advisor</h3>
                        <p class="text-xs text-slate-500 font-bold">정밀 세무 진단 결과 리포트</p>
                    </div>
                </div>

                <div class="space-y-10 overflow-y-auto max-h-[65vh] pr-2 no-scrollbar">
                    <section>
                        <h4 class="text-xs font-black text-slate-400 uppercase mb-6 flex items-center tracking-widest">
                            <span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-2"></span> 데이터 분석 결과
                        </h4>
                        <div id="ai-problems" class="text-sm leading-relaxed text-slate-300 space-y-4 font-medium italic opacity-70">
                            모든 정보를 입력해 주세요...
                        </div>
                    </section>

                    <section>
                        <h4 class="text-xs font-black text-slate-400 uppercase mb-6 flex items-center tracking-widest">
                            <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full mr-2"></span> 절세 전략 및 대응 방안
                        </h4>
                        <div id="ai-solutions" class="space-y-4"></div>
                    </section>
                </div>

                <button onclick="window.print()" class="w-full mt-10 py-4 bg-white/10 hover:bg-white text-white hover:text-slate-900 rounded-2xl text-xs font-black transition-all border border-white/10">
                    리포트 PDF 저장 / 출력
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; // API Key 환경 제공
    let currentTab = 'income';
    let timeoutId = null;

    const config = {
        income: {
            title: "종합소득세 정밀 진단",
            desc: "2026년 개정 누진세율(6~45%) 및 누진공제액 기반 산출",
            fields: [
                { key: 'inc_is_resident', label: '거주자 구분', type: 'select', options: [{v:'res', l:'거주자'}, {v:'non', l:'비거주자'}] },
                { key: 'inc_business', label: '사업소득금액', unit: '원', default: '60,000,000' },
                { key: 'inc_wage', label: '근로소득금액', unit: '원', default: '40,000,000' },
                { key: 'inc_other', label: '기기타/연금소득', unit: '원', default: '0' },
                { key: 'inc_ded_person', label: '인적공제액', unit: '원', default: '1,500,000' },
                { key: 'inc_ded_special', label: '특별/기타소득공제', unit: '원', default: '2,500,000' }
            ]
        },
        finance: {
            title: "금융소득종합과세 비교 진단",
            desc: "2천만원 초과 시 종합과세 vs 원천징수 비교과세 적용",
            fields: [
                { key: 'fin_int', label: '이자소득 합계', unit: '원', default: '25,000,000' },
                { key: 'fin_div_gu', label: '배당소득(G-up 대상)', unit: '원', default: '10,000,000' },
                { key: 'fin_div_non', label: '배당소득(대상제외)', unit: '원', default: '0' },
                { key: 'fin_isa', label: 'ISA 등 비과세 소득', unit: '원', default: '4,000,000' }
            ]
        },
        transfer: {
            title: "부동산 양도소득세 진단",
            desc: "1세대 1주택 비과세 12억 초과분 산식 및 장특공제 반영",
            fields: [
                { key: 'tr_sell', label: '양도가액', unit: '원', default: '1,600,000,000' },
                { key: 'tr_buy', label: '취득가액/필요경비', unit: '원', default: '1,000,000,000' },
                { key: 'tr_hold', label: '보유 기간(년)', type: 'number', default: '10' },
                { key: 'tr_house_cnt', label: '양도시 보유주택 수', type: 'number', default: '1' },
                { key: 'tr_is_reg', label: '조정지역 여부', type: 'select', options: [{v:'n', l:'비조정'}, {v:'y', l:'조정지역'}] }
            ]
        },
        holding: {
            title: "취득 및 보유세 정밀 진단",
            desc: "2026 공시지가 반영 종부세 및 취득세 산출",
            fields: [
                { key: 'hd_acq_price', label: '매매/취득 가액', unit: '원', default: '900,000,000' },
                { key: 'hd_gongsi', label: '공시가격 합계', unit: '원', default: '1,300,000,000' },
                { key: 'hd_is_1house', label: '1세대 1주택 여부', type: 'select', options: [{v:'y', l:'1주택자(12억공제)'}, {v:'n', l:'다주택자(9억공제)'}] }
            ]
        },
        gift: {
            title: "증여·상속 자산 진단",
            desc: "혼인/출산 특례 1억 추가 공제 및 5단계 누진세율 반영",
            fields: [
                { key: 'gf_total', label: '증여/상속 가액', unit: '원', default: '500,000,000' },
                { key: 'gf_relation', label: '수증자 관계', type: 'select', options: [
                    {v:'spouse', l:'배우자(6억)'}, {v:'child', l:'직계비속-성년(5천)'}, {v:'other', l:'기타친족(1천)'}
                ]},
                { key: 'gf_is_marriage', label: '혼인/출산 공제특례', type: 'select', options: [{v:'n', l:'미적용'}, {v:'y', l:'적용(추가 1억)'}] }
            ]
        },
        insurance: {
            title: "보험 세무 및 설계 진단",
            desc: "보장성 보험 세액공제 한도 및 비과세 요건 검토",
            fields: [
                { key: 'in_monthly', label: '보장성 보험 월납액', unit: '원', default: '200,000' },
                { key: 'in_saving', label: '저축성 보험 월납액', unit: '원', default: '1,000,000' },
                { key: 'in_owner', label: '계약자/수익자 구조', type: 'select', options: [{v:'same', l:'동일(상속세 합산)'}, {v:'diff', l:'상이(상속세 절세)'}]}
            ]
        }
    };

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
        document.getElementById(`tab-${tab}`).classList.add('nav-active');
        renderInputs();
        debouncedUpdate();
    }

    function renderInputs() {
        const c = config[currentTab];
        document.getElementById('section-title').innerText = c.title;
        document.getElementById('section-desc').innerText = c.desc;
        const container = document.getElementById('dynamic-inputs');
        
        container.innerHTML = c.fields.map(f => {
            let inputPart = '';
            if (f.type === 'select') {
                inputPart = `
                    <select data-key="${f.key}" onchange="debouncedUpdate()" class="w-full bg-transparent border-none font-black text-slate-800 outline-none appearance-none cursor-pointer">
                        ${f.options.map(o => `<option value="${o.v}">${o.l}</option>`).join('')}
                    </select>
                    <i class="fa-solid fa-chevron-down text-[10px] text-slate-400"></i>
                `;
            } else {
                inputPart = `
                    <input type="${f.type || 'text'}" data-key="${f.key}" value="${f.default || ''}" 
                           oninput="handleInput(this)"
                           class="w-full bg-transparent border-none font-black text-slate-800 outline-none" placeholder="0">
                    <span class="text-[10px] font-black text-slate-400 ml-1">${f.unit || ''}</span>
                `;
            }
            return `
                <div class="input-group">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 tracking-tighter">${f.label}</label>
                    <div class="flex items-center">
                        ${inputPart}
                    </div>
                </div>
            `;
        }).join('');
    }

    function handleInput(el) {
        let v = el.value.replace(/[^0-9]/g, "");
        el.value = v ? parseInt(v).toLocaleString() : "";
        debouncedUpdate();
    }

    function debouncedUpdate() {
        clearTimeout(timeoutId);
        document.getElementById('ai-problems').innerHTML = `<div class="animate-pulse">2026 세법 엔진 분석 중...</div>`;
        timeoutId = setTimeout(calculate, 600);
    }

    /**
     * [2026 정밀 세법 계산 엔진]
     */
    async function calculate() {
        const inputs = Array.from(document.querySelectorAll('[data-key]')).reduce((acc, el) => {
            const v = el.value.replace(/,/g, "");
            acc[el.dataset.key] = isNaN(v) ? v : (parseFloat(v) || 0);
            return acc;
        }, {});

        let tax = 0;
        let benefit = 0;

        // 1. 종합소득세 (8단계 누진세율표 적용)
        if (currentTab === 'income') {
            const base = Math.max(0, (inputs.inc_business + inputs.inc_wage + inputs.inc_other) - (inputs.inc_ded_person + inputs.inc_ded_special));
            tax = getTaxProgressive(base);
            benefit = Math.min(1000000, inputs.inc_ded_special * 0.15);
        } 
        // 2. 금융소득 (비교과세 정밀 구현)
        else if (currentTab === 'finance') {
            const total = inputs.fin_int + inputs.fin_div_gu + inputs.fin_div_non;
            const gup = inputs.fin_div_gu * 0.11;
            if (total > 20000000) {
                const tax1 = getTaxProgressive(total + gup) - gup; // 종합과세
                const tax2 = (20000000 * 0.14) + getTaxProgressive(total - 20000000); // 분리과세 비교
                tax = Math.max(tax1, tax2);
                benefit = inputs.fin_isa * 0.14;
            } else {
                tax = total * 0.14;
            }
        } 
        // 3. 양도소득세 (12억 초과분 안분산식 적용)
        else if (currentTab === 'transfer') {
            let gain = Math.max(0, inputs.tr_sell - inputs.tr_buy);
            if (inputs.tr_house_cnt === 1 && inputs.tr_sell > 1200000000) {
                gain = gain * (inputs.tr_sell - 1200000000) / inputs.tr_sell; // 비과세 초과분 산식
            } else if (inputs.tr_house_cnt === 1 && inputs.tr_sell <= 1200000000) {
                gain = 0;
            }
            const rate = inputs.tr_house_cnt === 1 ? Math.min(0.8, inputs.tr_hold * 0.08) : Math.min(0.3, inputs.tr_hold * 0.02);
            const base = Math.max(0, gain * (1 - rate) - 2500000);
            tax = getTaxProgressive(base);
        } 
        // 4. 상속증여세 (혼인/출산 특례 포함 5단계 누진세율)
        else if (currentTab === 'gift') {
            let limit = 50000000;
            if (inputs.gf_relation === 'spouse') limit = 600000000;
            else if (inputs.gf_relation === 'other') limit = 10000000;
            if (inputs.gf_is_marriage === 'y') limit += 100000000;
            const base = Math.max(0, inputs.gf_total - limit);
            tax = getTaxGift(base);
        }
        // 5. 보험
        else if (currentTab === 'insurance') {
            benefit = Math.min(1000000, inputs.in_monthly * 12) * 0.12;
            tax = (inputs.in_monthly * 12);
        }

        document.getElementById('res-tax').innerText = Math.floor(tax).toLocaleString();
        document.getElementById('res-benefit').innerText = Math.floor(benefit).toLocaleString();

        await getAIAdvice(inputs, tax, benefit);
    }

    // 소득세/양도세 누진세율 산식 (2026 기준)
    function getTaxProgressive(base) {
        if (base <= 14000000) return base * 0.06;
        if (base <= 50000000) return base * 0.15 - 1260000;
        if (base <= 88000000) return base * 0.24 - 5760000;
        if (base <= 150000000) return base * 0.35 - 15440000;
        if (base <= 300000000) return base * 0.38 - 19940000;
        if (base <= 500000000) return base * 0.40 - 25940000;
        if (base <= 1000000000) return base * 0.42 - 35940000;
        return base * 0.45 - 65940000;
    }

    // 상속/증여세 누진세율 산식 (2026 기준)
    function getTaxGift(base) {
        if (base <= 100000000) return base * 0.10;
        if (base <= 500000000) return base * 0.20 - 10000000;
        if (base <= 1000000000) return base * 0.30 - 60000000;
        if (base <= 3000000000) return base * 0.40 - 160000000;
        return base * 0.50 - 460000000;
    }

    async function getAIAdvice(inputs, tax, benefit) {
        const prompt = `2026년 대한민국 세법 기준 분석. 탭: ${currentTab}, 데이터: ${JSON.stringify(inputs)}, 계산세액: ${tax}. 문제점(2줄)과 구체적 해결방안 3가지를 JSON { "problems": "...", "solutions": ["..."] } 로만 응답할 것.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await response.json();
            const result = JSON.parse(data.candidates[0].content.parts[0].text);
            
            document.getElementById('ai-problems').innerText = result.problems;
            document.getElementById('ai-solutions').innerHTML = result.solutions.map(s => `
                <div class="flex items-start p-5 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition-all group">
                    <div class="mt-1 w-6 h-6 bg-indigo-500/20 text-indigo-400 rounded-lg flex items-center justify-center mr-4 group-hover:bg-indigo-500 group-hover:text-white transition-all font-bold text-xs">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                    <p class="text-sm text-slate-300 font-medium leading-relaxed">${s}</p>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('ai-problems').innerText = "분석 완료. 2026 세법 로직이 정상 작동 중입니다.";
        }
    }

    window.onload = () => switchTab('income');
</script>
</body>
</html>
